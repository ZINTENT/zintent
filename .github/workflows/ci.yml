name: ZINTENT CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Go unit tests (compiler)
        run: go test ./compiler -count=1

      - name: Verify CSS snapshots
        run: npm run test:snapshots

      - name: Run bundle budget gate
        run: npm run test:budget

      - name: Benchmark size gate (vs baseline)
        run: npm run benchmark:compare | tee benchmark.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: zintent-benchmark
          path: benchmark.txt
