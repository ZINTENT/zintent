name: Refresh CSS Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update snapshots
        run: npm run test:snapshots:update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "test: refresh CSS snapshots"
          title: "test: refresh CSS snapshots"
          body: |
            ## Summary
            - refreshes `tests/snapshots.json` using the latest compiler output
            - generated by the manual snapshot refresh workflow

            ## Validation
            - `npm run test:snapshots:update`
          branch: chore/refresh-css-snapshots
          delete-branch: true
