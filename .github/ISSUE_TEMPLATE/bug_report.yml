name: Bug report
description: Report a bug in compiler, output CSS, docs, or CI.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide reproducible details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise bug description.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, including commands and files used.
      placeholder: |
        1. Run `npm run ...`
        2. Open `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Compiler (Go)
        - Core CSS
        - Intent registry
        - Snapshot tests
        - Benchmarking
        - CI workflows
        - Docs
        - Other
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command used
      description: Paste the exact command if relevant.
      placeholder: go run ./compiler --input ...
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Node version, browser (if relevant).
      placeholder: Windows 10, Go 1.22, Node 20, Chrome 124
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste terminal output or screenshots.
      render: shell
